spring.config.import=optional:file:./.env[.properties]

spring.application.name=colaai

spring.docker.compose.file=../compose-dev.yaml
spring.docker.compose.lifecycle-management=start-only

server.port=8080
server.forward-headers-strategy=none

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

# Chave mestra para criptografar configs sensíveis salvas no banco
app.setup.master-key=${APP_SETUP_MASTER_KEY}